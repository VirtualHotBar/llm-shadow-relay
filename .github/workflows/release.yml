name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: llm-shadow-relay
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: llm-shadow-relay.exe
          - os: macos-latest
            target: x86_64-apple-darwin
            bin: llm-shadow-relay
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: llm-shadow-relay

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ${{ matrix.bin }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz ${{ matrix.bin }}
          sha256sum ${{ matrix.bin }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz > ${{ matrix.bin }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: target/${{ matrix.target }}/release/${{ matrix.bin }}-${{ github.ref_name }}-${{ matrix.target }}.tar.gz*

  release:
    name: Create Release
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate release notes
        run: |
          git log --pretty=format:"- %s" $(git tag --sort=-version:refname | head -1 || git rev-list --max-parents=0 HEAD)...HEAD > release-notes.md
          echo "" >> release-notes.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/commits/${{ github.ref_name }}" >> release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release-notes.md
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref_name, 'rc') || contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') }}
